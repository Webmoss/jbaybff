# =============================================================================
# Nginx vhost — JBay BFF
# -----------------------------------------------------------------------------
# Drop into /etc/nginx/conf.d/ on a Xneelo VPS or Cloud Hosting plan.
# For shared cPanel hosting, see `htaccess-proxy.txt` instead — Apache
# will reverse-proxy to PM2 via mod_proxy.
#
# Two server blocks: one for the public site (jbaybff.org.za) and one for
# the admin dashboard (admin.jbaybff.org.za). Each forwards to the matching
# PM2 process on 127.0.0.1.
# =============================================================================

# --- Public site -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name jbaybff.org.za www.jbaybff.org.za;

    # Force HTTPS once the AutoSSL / Let's Encrypt cert is provisioned.
    return 301 https://jbaybff.org.za$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jbaybff.org.za www.jbaybff.org.za;

    ssl_certificate /etc/letsencrypt/live/jbaybff.org.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jbaybff.org.za/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Static assets emitted by Next.js — long-cache.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# --- Admin dashboard ---------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin.jbaybff.org.za;
    return 301 https://admin.jbaybff.org.za$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.jbaybff.org.za;

    ssl_certificate /etc/letsencrypt/live/admin.jbaybff.org.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.jbaybff.org.za/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Optional: restrict the admin dashboard to office IPs.
    # allow 102.x.x.x;
    # deny all;

    client_max_body_size 25M;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
