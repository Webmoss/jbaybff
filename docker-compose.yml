services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jbaybff}
      MYSQL_USER: ${MYSQL_USER:-jbaybff}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jbaybff}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 25

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /workspace
    command: sh -c "pnpm --filter api prisma:generate && pnpm --filter api prisma:push && pnpm --filter api dev"
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-mysql://jbaybff:jbaybff@mysql:3306/jbaybff}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: ${PORT:-3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      SITE_URL: ${SITE_URL:-http://localhost:5173}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-12}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@jbaybff.org}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-ChangeMeSoon!}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-sk_test_placeholder}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-pk_test_placeholder}
      PAYSTACK_CALLBACK_URL: ${PAYSTACK_CALLBACK_URL:-http://localhost:5173/donate/thanks}
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/apps/api/node_modules
      - root_node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /workspace
    command: pnpm --filter web dev --host 0.0.0.0 --port 5173
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      VITE_ASSET_BASE: ${VITE_ASSET_BASE:-http://localhost:3000}
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
      - root_node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store

volumes:
  mysql_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  pnpm_store:
